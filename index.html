// 初始化积水数据
function initFloodData() {
    const baseLevels = { DEV001: 0.08, DEV002: 0.25, DEV003: 0.15, DEV004: 0.12, DEV005: 0.06, DEV006: 0.18 };
    const now = new Date();
    for (const dev of DB.devices) {
        const base = baseLevels[dev.device_id] || 0.15;
        for (let i = 19; i >= 0; i--) {
            const time = new Date(now.getTime() - i * 30 * 60 * 1000);
            const waterLevel = Math.max(0.02, base + (Math.random() - 0.3) * 0.4);
            const wl = Math.round(waterLevel * 100) / 100;
            const risk = getRiskLevel(wl);
            DB.flood_data.push({
                device_id: dev.device_id,
                water_level: wl,
                risk_level: risk,
                collect_time: formatTime(time)
            });
            if (risk === 'orange' || risk === 'red') {
                const riskText = risk === 'orange' ? '橙色预警' : '红色危险';
                DB.alerts.unshift({
                    id: DB.alerts.length + 1,
                    device_id: dev.device_id,
                    device_name: dev.name,
                    alert_type: '水位预警',
                    risk_level: risk,
                    water_level: wl,
                    message: `宜春市${dev.name}积水深度达到 ${wl}m，触发${riskText}`,
                    is_read: 0,
                    created_at: formatTime(time)
                });
            }
        }
    }
}

// 模拟数据更新（每30秒）
function simulateUpdate() {
    const baseLevels = { DEV001: 0.08, DEV002: 0.25, DEV003: 0.15, DEV004: 0.12, DEV005: 0.06, DEV006: 0.18 };
    const now = new Date();
    for (const dev of DB.devices) {
        const base = baseLevels[dev.device_id] || 0.15;
        const waterLevel = Math.max(0.02, base + (Math.random() - 0.3) * 0.4);
        const wl = Math.round(waterLevel * 100) / 100;
        const risk = getRiskLevel(wl);
        const timeStr = formatTime(now);
        DB.flood_data.push({ device_id: dev.device_id, water_level: wl, risk_level: risk, collect_time: timeStr });
        // 只保留最近50条
        const devData = DB.flood_data.filter(d => d.device_id === dev.device_id);
        if (devData.length > 50) {
            const toRemove = devData.length - 50;
            for (let i = 0; i < toRemove; i++) {
                const idx = DB.flood_data.indexOf(devData[i]);
                if (idx > -1) DB.flood_data.splice(idx, 1);
            }
        }
        if (risk === 'orange' || risk === 'red') {
            const riskText = risk === 'orange' ? '橙色预警' : '红色危险';
            DB.alerts.unshift({
                id: DB.alerts.length + 1,
                device_id: dev.device_id,
                device_name: dev.name,
                alert_type: '水位预警',
                risk_level: risk,
                water_level: wl,
                message: `宜春市${dev.name}积水深度达到 ${wl}m，触发${riskText}`,
                is_read: 0,
                created_at: timeStr
            });
            if (DB.alerts.length > 100) DB.alerts = DB.alerts.slice(0, 100);
        }
    }
}

// ==================== 工具函数 ====================
function getRiskLevel(waterLevel) {
    if (waterLevel < 0.15) return 'green';
    if (waterLevel < 0.3) return 'yellow';
    if (waterLevel < 0.5) return 'orange';
    return 'red';
}

function formatTime(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function getRiskText(level) {
    return { green: '正常', yellow: '关注', orange: '预警', red: '危险' }[level] || '正常';
}

function getRiskBadge(level) {
    return `<span class="badge badge-${level || 'green'}">${getRiskText(level)}</span>`;
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

function showModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {

function apiLogin(username, password) {
    const user = DB.users.find(u => u.username === username && u.password === password);
    if (user) {
        return { code: 200, message: '登录成功', data: { user_id: user.id, username: user.username, role: user.role } };

}

function apiGetDevices() {

function apiGetRiskAssess() {
    const devices = DB.devices.map(d => {
        const data = DB.flood_data.filter(f => f.device_id === d.device_id);
        const latest = data[data.length - 1] || { water_level: 0, risk_level: 'green', collect_time: '-' };
        return { device_id: d.device_id, name: d.name, longitude: d.longitude, latitude: d.latitude, location: d.location, water_level: latest.water_level, risk_level: latest.risk_level, collect_time: latest.collect_time };
    });
    const stats = { green: 0, yellow: 0, orange: 0, red: 0 };
    devices.forEach(d => { if (stats[d.risk_level] !== undefined) stats[d.risk_level]++; });
    return { code: 200, data: { devices, stats } };
}

function apiGetAlerts() {
    return { code: 200, data: DB.alerts.slice(0, 50).map(a => ({ ...a })) };
}

function apiGetDashboardStats() {
    const total = DB.devices.length;
    const online = DB.devices.filter(d => d.status === 'online').length;
    const alertCount = DB.alerts.filter(a => a.is_read === 0).length;
    const reportCount = DB.reports.filter(r => r.status === 'pending').length;
    const assess = apiGetRiskAssess();
    return { code: 200, data: { total_devices: total, online_devices: online, alert_count: alertCount, report_count: reportCount, risk_stats: assess.data.stats } };
}

function apiGetPrediction(deviceId) {
    const data = DB.flood_data.filter(f => f.device_id === deviceId);
    if (!data.length) return { code: 404, message: '无历史数据' };
    const recent = data.slice(-6).map(d => d.water_level);
    let trend = 0;
    if (recent.length > 1) {
        let sum = 0;
        for (let i = 1; i < recent.length; i++) sum += recent[i] - recent[i-1];
        trend = sum / (recent.length - 1);
    }
    const lastValue = recent[recent.length - 1];
    const now = new Date();
    const predictions = [];
    for (let i = 1; i <= 3; i++) {
        const predValue = Math.max(0, lastValue + trend * i + (Math.random() - 0.5) * 0.06);
        const predTime = new Date(now.getTime() + i * 3600000);
        predictions.push({ hour: i, predicted_water_level: Math.round(predValue * 100) / 100, risk_level: getRiskLevel(predValue), predicted_time: formatTime(predTime) });
    }
    const history = recent.map((v, i) => {
        const t = new Date(now.getTime() - (6 - i) * 3600000);
        return { time: `${String(t.getHours()).padStart(2,'0')}:00`, value: v };
    });
    return { code: 200, data: { device_id: deviceId, history, predictions, model: 'LSTM（模拟）' } };
}

function apiGetHistory(deviceId) {
    const data = DB.flood_data.filter(f => f.device_id === deviceId).slice(-24).reverse();
    return { code: 200, data: data.map(d => ({ time: d.collect_time, water_level: d.water_level, risk_level: d.risk_level })) };
}

function apiExportData(deviceId) {
    const data = DB.flood_data.filter(f => f.device_id === deviceId).slice(-100).reverse();
    let csv = '\ufeff设备ID,积水深度(m),风险等级,采集时间\n';
    const riskMap = { green: '正常', yellow: '关注', orange: '预警', red: '危险' };
    for (const d of data) csv += `${d.device_id},${d.water_level},${riskMap[d.risk_level]||d.risk_level},${d.collect_time}\n`;
    return { code: 200, data: { filename: `flood_data_${deviceId}_${formatTime(new Date()).split(' ')[0].replace(/-/g,'')}.csv`, content: csv } };
}

function apiTravel() {
    const assess = apiGetRiskAssess();
    const devices = assess.data.devices;
    const safe = devices.filter(d => d.risk_level === 'green');
    const caution = devices.filter(d => d.risk_level === 'yellow');
    const danger = devices.filter(d => d.risk_level === 'orange' || d.risk_level === 'red');
    const suggestions = [];
    if (danger.length) suggestions.push(`【避开】${danger.map(a => a.name.replace('监测点','')).join('、')}区域积水严重，请绕行`);
    if (caution.length) suggestions.push(`【注意】${caution.map(a => a.name.replace('监测点','')).join('、')}区域有轻微积水，缓慢通行`);
    if (safe.length) suggestions.push(`【畅通】${safe.map(a => a.name.replace('监测点','')).join('、')}区域道路正常`);
    if (!danger.length && !caution.length) suggestions.push('目前全市道路积水情况良好，可正常出行');
    return { code: 200, data: { safe_areas: safe, caution_areas: caution, danger_areas: danger, suggestions } };
}

    if (!deviceId) { showToast('请选择设备'); return; }
    showToast('正在执行AI预测...');
    setTimeout(() => {

            document.getElementById('prediction-result').style.display = 'block';
            drawPredictionChart(res.data);
        }
    }, 800);

function drawPredictionChart(data) {
    const history = data.history;
    const predictions = data.predictions;
    const allValues = [...history.map(h => h.value), ...predictions.map(p => p.predicted_water_level)];
    const maxVal = Math.max(...allValues) * 1.2;
    const width = 600, height = 250, padding = 40;
    const points = allValues.length;
    const stepX = (width - padding * 2) / (points - 1);
    let historyPath = '';
    history.forEach((h, i) => {
        const x = padding + i * stepX;
        const y = height - padding - ((h.value) / maxVal) * (height - padding * 2);
        historyPath += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
    });
    const lastX = padding + (history.length-1) * stepX;
    const lastY = height - padding - (history[history.length-1].value / maxVal) * (height - padding * 2);
    let predictPath = `M${lastX},${lastY} `;
    predictions.forEach((p, i) => {
        const x = padding + (history.length + i) * stepX;
        const y = height - padding - (p.predicted_water_level / maxVal) * (height - padding * 2);
        predictPath += `L${x},${y} `;
    });
    document.getElementById('prediction-chart').innerHTML = `
        <svg width="100%" height="100%" viewBox="0 0 ${width} ${height}" style="background:#fff;border-radius:8px;">
            <text x="${width/2}" y="20" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">积水深度预测趋势图</text>
            <line x1="${padding}" y1="${height-padding}" x2="${width-padding}" y2="${height-padding}" stroke="#ddd"/>
            <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height-padding}" stroke="#ddd"/>
            <path d="${historyPath}" fill="none" stroke="#2196f3" stroke-width="2"/>
            ${history.map((h,i) => { const x=padding+i*stepX; const y=height-padding-(h.value/maxVal)*(height-padding*2); return `<circle cx="${x}" cy="${y}" r="3" fill="#2196f3"/>`; }).join('')}
            <path d="${predictPath}" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
            ${predictions.map((p,i) => { const x=padding+(history.length+i)*stepX; const y=height-padding-(p.predicted_water_level/maxVal)*(height-padding*2); return `<circle cx="${x}" cy="${y}" r="4" fill="${p.risk_level==='red'?'#f44336':p.risk_level==='orange'?'#ff9800':'#4caf50'}"/>`; }).join('')}
        </svg>`;
    document.getElementById('prediction-details').innerHTML = predictions.map(p => `
        <div style="display:inline-block;padding:12px 20px;margin-right:12px;background:#f5f7fa;border-radius:8px;">
            <div style="font-size:12px;color:#999;">未来 ${p.hour} 小时</div>
            <div style="font-size:20px;font-weight:bold;color:${p.risk_level==='red'?'#c62828':p.risk_level==='orange'?'#e65100':'#2e7d32'};">${p.predicted_water_level}m</div>
            ${getRiskBadge(p.risk_level)}</div>`).join('');
}

function drawHistoryChart(data) {
    const chartDiv = document.getElementById('history-chart');
    if (!data.length) { chartDiv.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">暂无数据</p>'; return; }
    const values = data.map(d => d.water_level);
    const maxVal = Math.max(...values) * 1.2;
    const width = 600, height = 250, padding = 40;
    const stepX = (width - padding * 2) / Math.max(data.length - 1, 1);
    let path = '';
    data.forEach((d, i) => {
        const x = padding + i * stepX;
        const y = height - padding - (d.water_level / maxVal) * (height - padding * 2);
        path += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
    });
    chartDiv.innerHTML = `<svg width="100%" height="100%" viewBox="0 0 ${width} ${height}" style="background:#fff;border-radius:8px;">
        <text x="${width/2}" y="20" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">24小时积水深度变化</text>
        <line x1="${padding}" y1="${height-padding}" x2="${width-padding}" y2="${height-padding}" stroke="#ddd"/>
        <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height-padding}" stroke="#ddd"/>
        <path d="${path}" fill="none" stroke="#2196f3" stroke-width="2"/>
        ${data.map((d,i) => { const x=padding+i*stepX; const y=height-padding-(d.water_level/maxVal)*(height-padding*2); return `<circle cx="${x}" cy="${y}" r="3" fill="${d.risk_level==='red'?'#f44336':d.risk_level==='orange'?'#ff9800':d.risk_level==='yellow'?'#ffeb3b':'#4caf50'}"/>`; }).join('')}</svg>`;
}

        document.getElementById('user-stats').innerHTML = `
            <div class="stat-card"><div class="icon" style="background:#e8f5e9;color:#388e3c;">✅</div><div class="value">${stats.green||0}</div><div class="label">正常路段</div></div>
            <div class="stat-card"><div class="icon" style="background:#fff9c4;color:#f57f17;">⚠️</div><div class="value">${stats.yellow||0}</div><div class="label">关注路段</div></div>
            <div class="stat-card"><div class="icon" style="background:#ffe0b2;color:#e65100;">🚧</div><div class="value">${stats.orange||0}</div><div class="label">预警路段</div></div>
            <div class="stat-card"><div class="icon" style="background:#ffcdd2;color:#c62828;">⛔</div><div class="value">${stats.red||0}</div><div class="label">危险路段</div></div>`;
        if (stats.orange > 0 || stats.red > 0) {
            const banner = document.getElementById('realtime-alert-banner');
            banner.className = 'alert-banner show';
            banner.innerHTML = `<strong>⚠️ 出行提醒</strong> | 当前有 ${stats.orange||0} 个预警路段、${stats.red||0} 个危险路段，请注意避开积水区域！`;
        }
        document.getElementById('user-realtime-list').innerHTML = d.devices.map(dev => `
            <tr><td>${dev.name}</td><td>${dev.location||'-'}</td><td>${dev.water_level}m</td>
            <td>${getRiskBadge(dev.risk_level)}</td><td>${dev.collect_time||'-'}</td></tr>`).join('');
    }
}

function loadUserAlerts() {
    const res = apiPublicAlerts();
    if (res.code === 200) {
        const div = document.getElementById('user-alerts-list');
        if (res.data.length === 0) {
            div.innerHTML = '<div style="text-align:center;padding:40px;color:#999;background:#fff;border-radius:8px;">暂无预警信息，一切正常 ✅</div>';
        } else {
            const dangerCount = res.data.filter(a => a.risk_level === 'red').length;
            const warnCount = res.data.filter(a => a.risk_level === 'orange').length;
            if (dangerCount > 0 || warnCount > 0) {
                const banner = document.getElementById('alerts-warning-banner');
                banner.className = 'alert-banner show';
                banner.innerHTML = `<strong>🚨 预警提醒</strong> | 最近有 ${warnCount} 条预警、${dangerCount} 条危险信息，请注意安全！`;
            }
            div.innerHTML = res.data.map(a => `
                <div class="alert-item"><div class="left">
                    <div class="device">${a.device_name||a.device_id} ${getRiskBadge(a.risk_level)}</div>
                    <div class="msg">${a.message}</div>
                    ${a.location ? `<div style="font-size:12px;color:#999;margin-top:4px;">📍 ${a.location}</div>` : ''}
                </div><div class="time">${a.created_at||''}</div></div>`).join('');
        }
    }
}

function loadUserReport() { loadMyReports(); }
function submitReport() {
    const data = { reporter_name: document.getElementById('report-name').value, reporter_phone: document.getElementById('report-phone').value, location: document.getElementById('report-location').value, water_depth: document.getElementById('report-depth').value, description: document.getElementById('report-desc').value };
    if (!data.location || !data.description) { showToast('请填写积水位置和描述'); return; }
    const res = apiSubmitReport(data);
    if (res.code === 200) {
        showToast('上报成功！工作人员将尽快核实处理');
        document.getElementById('report-name').value = '';
        document.getElementById('report-phone').value = '';
        document.getElementById('report-location').value = '';
        document.getElementById('report-desc').value = '';
        loadMyReports();
    }
}
function loadMyReports() {
    const res = apiMyReports();
    if (res.code === 200) {
        const statusMap = { pending: '待处理', verified: '已核实', resolved: '已解决' };
        const div = document.getElementById('my-reports-list');
        if (res.data.length === 0) {
            div.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">您还没有上报记录</div>';
        } else {
            div.innerHTML = res.data.map(r => `
                <div class="report-card ${r.status}">
                    <div style="display:flex;justify-content:space-between;"><strong>${r.location}</strong>
                    <span class="badge badge-${r.status==='pending'?'orange':r.status==='verified'?'yellow':'green'}">${statusMap[r.status]||r.status}</span></div>
                    <div style="margin-top:6px;font-size:13px;color:#666;">${r.description}</div>
                    <div style="margin-top:4px;font-size:12px;color:#999;">程度：${r.water_depth} | 时间：${r.created_at}</div>
                    ${r.admin_reply ? `<div style="margin-top:8px;padding:8px;background:#e3f2fd;border-radius:6px;font-size:13px;"><strong>官方回复：</strong>${r.admin_reply}</div>` : ''}
                </div>`).join('');
        }
    }
}

function loadUserTravel() {
    const res = apiTravel();
    if (res.code === 200) {
        const d = res.data;
        const sugDiv = document.getElementById('travel-suggestions');
        if (d.suggestions.length === 0) {
            sugDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">暂无建议</div>';
        } else {
            sugDiv.innerHTML = d.suggestions.map(s => {
                let cls = 'suggestion-safe';
                if (s.startsWith('【避开】')) cls = 'suggestion-danger';
                else if (s.startsWith('【注意】')) cls = 'suggestion-caution';
                return `<div class="suggestion-box ${cls}">${s}</div>`;
            }).join('');
        }
        const areasDiv = document.getElementById('travel-areas');
        let html = '';
        if (d.danger_areas.length > 0) {
            html += '<h4 style="color:#c62828;margin-bottom:8px;">⛔ 危险区域（请避开）</h4>';
            html += d.danger_areas.map(a => `<div style="padding:8px;background:#ffebee;border-radius:6px;margin-bottom:6px;"><strong>${a.name}</strong> - 积水 ${a.water_level}m ${getRiskBadge(a.risk_level)}</div>`).join('');
        }
        if (d.caution_areas.length > 0) {
            html += '<h4 style="color:#f57f17;margin:12px 0 8px;">⚠️ 注意区域（小心通行）</h4>';
            html += d.caution_areas.map(a => `<div style="padding:8px;background:#fff9c4;border-radius:6px;margin-bottom:6px;"><strong>${a.name}</strong> - 积水 ${a.water_level}m ${getRiskBadge(a.risk_level)}</div>`).join('');
        }
        if (d.safe_areas.length > 0) {
            html += '<h4 style="color:#2e7d32;margin:12px 0 8px;">✅ 安全区域（可正常通行）</h4>';
            html += d.safe_areas.map(a => `<div style="padding:8px;background:#e8f5e9;border-radius:6px;margin-bottom:6px;"><strong>${a.name}</strong> - ${a.water_level}m ${getRiskBadge(a.risk_level)}</div>`).join('');
        }
        areasDiv.innerHTML = html || '<div style="padding:20px;color:#999;text-align:center;">暂无数据</div>';
    }
}

function loadUserProfile() {
    const res = apiGetProfile();
    if (res.code === 200) {
        const d = res.data;
        document.getElementById('profile-username').textContent = d.username;
        document.getElementById('profile-role').textContent = d.role === 'admin' ? '管理员' : '用户';
        document.getElementById('profile-phone').value = d.phone || '';
        document.getElementById('profile-email').value = d.email || '';
        document.getElementById('profile-created').textContent = d.created_at;
        document.getElementById('profile-reports').textContent = d.report_count + ' 条';
    }
}
function updateProfile() {
    const res = apiUpdateProfile(document.getElementById('profile-phone').value, document.getElementById('profile-email').value);
    if (res.code === 200) showToast('信息更新成功');
}
function changePassword() {
    const oldPwd = document.getElementById('old-pwd').value;
    const newPwd = document.getElementById('new-pwd').value;
    const confirmPwd = document.getElementById('confirm-pwd').value;
    if (!oldPwd || !newPwd) { showToast('请填写旧密码和新密码'); return; }
    if (newPwd !== confirmPwd) { showToast('两次输入的新密码不一致'); return; }
    if (newPwd.length < 6) { showToast('新密码至少6位'); return; }
    const res = apiChangePassword(oldPwd, newPwd);
    if (res.code === 200) {
        showToast('密码修改成功');
        document.getElementById('old-pwd').value = '';
        document.getElementById('new-pwd').value = '';
        document.getElementById('confirm-pwd').value = '';
    }
}

// ==================== 初始化 ====================
initFloodData();

// 每30秒模拟数据更新
setInterval(() => {
    simulateUpdate();
    if (!currentUser) return;
    const activeNav = document.querySelector('#nav-menu a.active');
    if (!activeNav) return;
    const navId = activeNav.id;
    if (currentUser.role === 'admin') {
        if (navId === 'nav-dashboard') loadAdminDashboard();
    } else {
        if (navId === 'nav-realtime') loadUserRealtime();
        if (navId === 'nav-alerts') loadUserAlerts();
    }
}, 30000);
</script>
